        <button class="pass-btn" style="margin-top:.3rem" onclick="doPassFixed()">Pass</button>`;
      window.doBuyFixed=function(pr,sid){
        const me=G.players[0];if(me.money<pr){addLog('資金不足');doPassFixed();return;}
        me.money-=pr;G.players[sid].money+=pr;me.bought.push(...cards);
        recordEarning(sid,0,pr);
        hideBidControls();addLog(`🔨 你以 $${pr} 購入`,true,false,true);
        flyCards(cards,0,()=>afterAuction(sid));
      };
      window.doPassFixed=function(){addLog('你 Pass',true);hideBidControls();nxt();};
    } else {
      const isSeller=pid===sellerPid;
      const mx=aiMax(p,cards[0],isSeller);
      const will=!isSeller&&p.money>=safePrice&&mx>=safePrice&&Math.random()>aiPassRate();
      if(will||last){
        p.money-=safePrice;
        if(!last)G.players[sellerPid].money+=safePrice;
        p.bought.push(...cards);
        recordEarning(sellerPid,pid,safePrice);
        const isMyCard=sellerPid===0;
        addLog(last?`${ns(p)} 強制自購 $${safePrice}（付銀行）`:`🔨 ${ns(p)} 以 $${safePrice} 購入${isMyCard?` → 你收 $${safePrice}`:''}`,false,false,false,isMyCard&&!last);
        flyCards(cards,pid,()=>afterAuction(sellerPid));
      } else {addLog(`${ns(p)} Pass`);setTimeout(nxt,500);}
    }
  }
  setTimeout(nxt,300);
}

// ══ AI LOGIC v3 — FULL REWRITE ═══════════════════

// ── UNIFIED ARTIST EV ENGINE ─────────────────────
// The single source of truth for how valuable a card is.
// Considers: cumulative value, current round count, competition from other artists,
// artist scarcity (rare artists are harder to topple), and remaining rounds.
function artistEV(ai, hypExtraCards=0){
  const cv    = G.mvals[ai].reduce((a,b)=>a+b, 0);
  const out   = G.rOut[ai] + hypExtraCards;
  const rnd   = G.round;
  const total = ATOTAL[ai]; // 12-16

  // ── Base placement probabilities (by cards-out count) ──
  // These are probability of finishing 1st / 2nd / 3rd this round
  const base = [
    [0,    0,    0   ],  // 0 cards: essentially 0
    [0.04, 0.07, 0.12],  // 1 card
    [0.10, 0.18, 0.28],  // 2 cards
    [0.28, 0.35, 0.22],  // 3 cards (sum ~0.85 for top3)
    [0.55, 0.25, 0.12],  // 4 cards
    [0.70, 0.18, 0.08],  // 5 cards (called round, winner likely)
  ];
  const [p1b, p2b, p3b] = base[Math.min(out, 5)];

  // ── Competition adjustment (tie-breaker aware) ──
  // An artist with the same count but higher aOut loses the tie → ranks lower
  // Count how many artists are AHEAD of us (higher count, or same count but lower aOut)
  let competitorCount = 0;
  ARTISTS.forEach((_,i) => {
    if(i===ai) return;
    const theirOut = G.rOut[i];
    if(theirOut > out) competitorCount++;
    else if(theirOut === out && out > 0 && G.aOut[i] < G.aOut[ai]) competitorCount++;
    // same count but they appeared earlier → they rank ahead of us
  });
  const compPenalty = competitorCount * 0.07;
  const p1 = Math.max(0.01, p1b - compPenalty*1.2);
  const p2 = Math.max(0.01, p2b - compPenalty*0.8);
  const p3 = Math.max(0.01, p3b - compPenalty*0.5);
  const pPlace = p1+p2+p3; // total probability of placing top3

  // ── Scarcity adjustment (Q1: rare artists harder to topple) ──
  // BUT also harder to accumulate to high count in first place
  // Key insight: in late rounds, an artist with fewer total cards has FEWER
  // cards remaining in circulation, making it HARDER to push to 1st/2nd,
  // not easier. The scarcity helps early (hard to catch up) but hurts late
  // (less fuel to drive).
  // Scarcity boost: applies when out is ALREADY high (hard to add more cards)
  // Scarcity penalty: applies when out is LOW in late rounds (hard to build)
  const scarcity = (16 - total) / 16; // LM=0.25, YK~0.19, CP~0.125, KG~0.06, KP=0
  let scarcityFactor = 1.0;
  if(out >= 2){
    // Already has cards → rare artist hard to catch → slight boost
    scarcityFactor = 1 + scarcity * 0.15;
  }
  if(rnd >= 3 && out <= 1){
    // Late round, cold start, rare artist means even fewer cards to emerge
    scarcityFactor = 1 - scarcity * 0.2;
  }

  // ── This-round value if placed ──
  // This is what you actually GET when the round ends and cards are cleared.
  const thisRoundGain = (cv+30)*p1 + (cv+20)*p2 + (cv+10)*p3;

  // ── Future rounds potential ──
  // Cards are CLEARED each round — a buyer gets one settlement, not future ones.
  // Future value is relevant for CARD PLAY decisions (aiPlayCard) but NOT for
  // bidding (aiMax), where you only recoup the current round's payout.
  // We keep it in rawEV for card-play scoring, but aiMax uses thisRoundGain directly.
  const futureRounds = Math.max(0, 4 - rnd);
  const futurePotential = futureRounds * pPlace * 0.3 * 20;

  // rawEV = full expected value (used for card-play scoring)
  const rawEV = (thisRoundGain + futurePotential) * scarcityFactor;
  // bidEV = what a BUYER can actually recoup at settlement (no future rounds)
  const bidEV = thisRoundGain * scarcityFactor;

  return {
    p1, p2, p3, pPlace,
    cv, thisRoundGain,
    rawEV,   // for card-play scoring (includes future rounds)
    bidEV,   // for bidding only (current round settlement only)
    scarcityFactor,
    expected: Math.floor(rawEV),
    prob: Math.round(pPlace*100),
  };
}

// ── MAX BID CALCULATOR ───────────────────────────
// v10 改進：
//   LV1    : 友善出價（略低於平手點），讓初學者容易買到牌，體驗更好
//   LV2    : 樂觀偏差，bidEV × 0.60，偶爾超標（情緒化）
//   LV3    : 損失感知理性公式，接近 halfValue + 固定溢價
//   LV4    : halfValue + 動態溢價（synergy/位置/盈虧感知）
//   LV5    : halfValue + 資金感知 + 反制溢價
//   Ceiling: cv+30 是任何情況下的硬上限（已修正避免出超過最大回收值）
function cardMaxValue(ai){
  const cv = G.mvals[ai].reduce((a,b)=>a+b, 0);
  return cv + 30; // buyer can never recoup more than this in one settlement
}

// ── buyer threat score ─────────────────────────────
// LV4+ 出價時感知：這個畫家對哪些對手已有協同效益
// 若對手持有同畫家 2+ 張，買了之後對手更容易確保入圍，這是一個「威脅放大」
// 因此買家出價上限應略為保守（風險分散到對手也有牌的情境）
// weight 設計偏低（0.06），不讓這個因素主導決策，僅作微調
function buyerThreatAdjust(card, buyerPid){
  if(C.diff!=='expert' && C.diff!=='genius') return 1.0;
  const ai = card.ai;
  // Count how many OTHER players already have 2+ cards of this artist
  const threatPlayers = G.players.filter((p,i)=>{
    if(i===buyerPid) return false;
    return p.bought.filter(c=>c.ai===ai).length >= 2;
  }).length;
  // Each threatening opponent reduces buyer's willingness slightly
  // Risk: buying this card also helps them confirm placement
  // Cap reduction at 12% total (low weight as per design note 1.2A)
  return Math.max(0.88, 1 - threatPlayers * 0.06);
}

function aiMax(player, card, isOwnCard=false){
  const ai      = card.ai;
  const ev      = artistEV(ai, 1); // +1 = assuming we buy this card
  const ceiling = cardMaxValue(ai);
  const pid     = G.players.indexOf(player);

  // ── Seller buyback logic ──
  if(isOwnCard){
    return Math.floor(Math.min(ev.rawEV * 0.45, player.money));
  }

  // ── Synergy: already own same artist ──
  const sameOwned = player.bought.filter(c=>c.ai===ai).length;
  // LV1-2: smaller synergy感知; LV3+: standard synergy
  const synergyMult = (C.diff==='easy'||C.diff==='normal')
    ? 1 + Math.min(0.10, sameOwned * 0.04)
    : 1 + Math.min(0.25, sameOwned * 0.10);

  // ── Core bid computation by difficulty ──────────────
  let adjustedEV;

  if(C.diff==='easy'){
    // ── LV1 友善出價：略低於理論平手點，讓玩家容易買到牌
    // halfValue = bidEV × 0.5 是雙方平手點；easy 出到 ~0.45 讓玩家略佔優
    // 帶隨機波動讓行為自然（有時候出到 0.5 以上，有時候更低）
    adjustedEV = ev.bidEV * (0.38 + Math.random() * 0.14); // ≈ 0.38–0.52 × bidEV
  } else if(C.diff==='normal'){
    // ── LV2 樂觀偏差：不知道平手點，追 bidEV 的 55-70%，偶爾情緒化超標
    const emotionBoost = Math.random() < 0.18 ? 1.25 : 1.0; // 18% 情緒化
    adjustedEV = ev.bidEV * (0.55 + Math.random() * 0.15) * emotionBoost * synergyMult;
  } else {
    // ── LV3-5 損失感知公式：p×gain/(1-p)，接近 halfValue + 溢價
    const p    = Math.max(0.05, Math.min(0.80, ev.pPlace));
    const gain = ev.bidEV * synergyMult;
    adjustedEV = Math.min(gain, (p * gain) / Math.max(0.20, 1-p));
  }

  // ── Earnings-awareness (LV3+) ──
  let earningsFactor = 1.0;
  if((C.diff==='hard'||C.diff==='expert'||C.diff==='genius') && G.roundEarnings){
    const myE    = G.roundEarnings[pid]||0;
    const maxOppE = Math.max(0, ...G.roundEarnings.filter((_,i)=>i!==pid));
    if(myE > 25)              earningsFactor = 0.88;
    else if(maxOppE-myE > 35) earningsFactor = 1.10;
  }

  // ── Buyer threat adjustment (LV4+, low weight ≤12%) ──
  const threatFactor = buyerThreatAdjust(card, pid);

  // ── Wealth factor (LV5 genius only) ──
  let wealthFactor = 1.0;
  if(C.diff==='genius'){
    const avgOpp = G.players.filter(p=>p!==player).reduce((s,p)=>s+p.money,0)/(G.n-1);
    wealthFactor = avgOpp < 40 ? 1.15 : avgOpp > 85 ? 0.93 : 1.0;
  }

  // ── Position factor ──
  let posFactor = 1.0;
  if(C.diff!=='easy'){
    if(pid>=3)       posFactor = 0.94;
    else if(pid===2) posFactor = 0.97;
    else if(pid===1) posFactor = 1.03;
  }

  // ── Difficulty scaling ──
  const diffMult = {easy:.40, normal:.60, hard:.80, expert:.95, genius:1.0}[C.diff]||.95;
  const variance = {easy:.28, normal:.20, hard:.12, expert:.08, genius:.05}[C.diff]||.08;

  let base = adjustedEV * diffMult * earningsFactor * threatFactor * wealthFactor * posFactor;
  base *= 1 + (Math.random()-.5)*variance;

  return Math.max(1, Math.floor(Math.min(base, ceiling*0.90, player.money)));
}

function aiPassRate(){ return {easy:.60,normal:.42,hard:.25,expert:.13,genius:.08}[C.diff]||.13; }
function isCurrentSeller(pid){ return G.auction&&G.auction.sellerPid===pid; }

// ── CALL ROUND EVALUATOR ─────────────────────────
// v10 改進：
//   1. oppGain 動態加權（對手持有確定性高才算真正威脅）
//   2. wastedTurnCost 動態化（依手牌剩餘價值，而非固定值）
//   3. isLeadAtRisk 時機鎖定：領先不穩固時積極 call
//   4. 每回合 call round 的獲益和代價都納入計算
// 返回正值 = 應 call round，負值 = 不應 call
function aiCallRoundValue(player, card){
  const ai  = card.ai;
  if(G.rOut[ai]!==4) return 0;

  const pid = G.players.indexOf(player);
  const cv  = G.mvals[ai].reduce((a,b)=>a+b,0);
  const rnd = G.round;

  // ── 當前排名快照 ──
  const snapshot = ARTISTS.map((_,oai)=>({oai, cnt:G.rOut[oai], aOut:G.aOut[oai]}))
    .filter(x=>x.cnt>0)
    .sort((a,b)=>b.cnt-a.cnt || a.aOut-b.aOut);
  const myArtistRank = snapshot.findIndex(x=>x.oai===ai);
  const myRankVal    = myArtistRank>=0 && myArtistRank<=2 ? RVAL[myArtistRank] : 0;

  // ── 我的總收益（trigger 畫家 + 第 2/3 名的我的持有）──
  const myBought      = player.bought.filter(c=>c.ai===ai).length;
  const myTriggerGain = myBought * (cv + myRankVal);

  let my2ndGain = 0, my3rdGain = 0;
  if(snapshot.length>=2){
    const second = snapshot[1];
    if(second.oai !== ai){
      const my2nd = player.bought.filter(c=>c.ai===second.oai).length;
      const cv2   = G.mvals[second.oai].reduce((a,b)=>a+b,0);
      my2ndGain   = my2nd * (cv2 + RVAL[1]);
    }
  }
  if(snapshot.length>=3){
    const third = snapshot[2];
    if(third.oai !== ai){
      const my3rd = player.bought.filter(c=>c.ai===third.oai).length;
      const cv3   = G.mvals[third.oai].reduce((a,b)=>a+b,0);
      my3rdGain   = my3rd * (cv3 + RVAL[2]);
    }
  }
  const myTotalGain = myTriggerGain + my2ndGain + my3rdGain;

  // ── 手牌損失 ──
  const myHandSame = player.hand.filter(c=>c.ai===ai).length;
  const carryValue = cv * 0.25;
  const handLoss   = Math.max(0, myHandSame * (11 - carryValue));

  // ── oppGain 動態加權（v10 新增）──
  // 入圍「確定性」高的對手持有才算真正威脅（較高係數）
  // 分散持有、未必入圍的算低威脅（較低係數）
  // LV1-2 維持固定 0.30 係數（計算能力有限）
  let oppGain = 0;
  G.players.forEach((opp,i)=>{
    if(i===pid) return;
    snapshot.forEach((entry,rank)=>{
      if(rank>=3) return;
      const cnt = opp.bought.filter(c=>c.ai===entry.oai).length;
      if(!cnt) return;
      const entryCV = G.mvals[entry.oai].reduce((a,b)=>a+b,0);
      const gain    = cnt * (entryCV + (RVAL[rank]||0));
      let weight;
      if(C.diff==='easy'||C.diff==='normal'){
        weight = 0.30; // 固定係數
      } else {
        // 動態：持有 3+ 張 or 已達 4 張出牌 → 高確定性威脅
        const ownedCnt = opp.bought.filter(c=>c.ai===entry.oai).length;
        const isHighCertainty = ownedCnt >= 3 || G.rOut[entry.oai] >= 4;
        weight = isHighCertainty ? 0.45 : 0.18;
      }
      oppGain += gain * weight;
    });
  });

  // ── LV4/5: futureThreat ──
  let futureThreat = 0;
  if(C.diff==='expert'||C.diff==='genius'){
    ARTISTS.forEach((_,oai)=>{
      if(oai===ai) return;
      const oOut = G.rOut[oai];
      if(oOut<2) return;
      const oppBoughtOai = G.players.filter((_,i)=>i!==pid)
        .reduce((s,p)=>s+p.bought.filter(c=>c.ai===oai).length,0);
      if(oppBoughtOai>0 && Math.abs(oOut-G.rOut[ai])<=1){
        futureThreat -= 7;
      }
    });
    if(C.diff==='genius'){
      const bigHandOpp = G.players.filter((_,i)=>i!==pid&&G.players[i].hand.length>=3).length;
      if(bigHandOpp>=2) futureThreat -= 6;
    }
  }

  // ── wastedTurnCost 動態化（v10 新增）──
  // LV1-2 固定值；LV3-5 依手牌剩餘 rawEV 動態計算
  // 代價 = 損失幾次出牌機會的預期收益（手牌好代價高，手牌爛代價低）
  let wastedTurnCost;
  if(C.diff==='easy'||C.diff==='normal'){
    wastedTurnCost = rnd===4 ? 6 : rnd===3 ? 11 : 14;
  } else {
    const handValue = player.hand
      .filter(c=>c.ai!==ai)
      .reduce((sum,c)=>sum + artistEV(c.ai,1).rawEV, 0);
    const avgHandVal = player.hand.length > 1
      ? handValue / Math.max(1, player.hand.length - 1)
      : 8;
    const turnsLeftEst = Math.max(1, player.hand.length - 1);
    wastedTurnCost = Math.min(20, Math.max(4, avgHandVal * 0.35 * Math.min(turnsLeftEst, 3)));
    if(rnd===4) wastedTurnCost = Math.min(wastedTurnCost, 7);
  }

  // ── isLeadAtRisk 時機鎖定（v10 新增，LV4+）──
  // 若我在此畫家的領先不穩固（比第二名只多1張，且對手手上還有牌），積極 call
  // 但同時 call round 對手也會結算，玩家需承擔 oppGain 已在公式中扣除的代價
  let leadRiskBonus = 0;
  if(C.diff==='expert'||C.diff==='genius'){
    const myBoughtAi     = player.bought.filter(c=>c.ai===ai).length;
    const maxOppBoughtAi = Math.max(0, ...G.players
      .filter((_,i)=>i!==pid)
      .map(p=>p.bought.filter(c=>c.ai===ai).length));
    const oppHandHasSame = G.players
      .filter((_,i)=>i!==pid)
      .some(p=>p.hand.filter(c=>c.ai===ai).length > 0);
    // 領先不穩固：我持有 ≥ 2 且領先差距 ≤ 1 且對手手上還有同畫家牌
    const leadIsShaky = myBoughtAi >= 2 && (myBoughtAi - maxOppBoughtAi) <= 1 && oppHandHasSame;
    if(leadIsShaky) leadRiskBonus = 10;
  }

  const net = myTotalGain - handLoss - oppGain + futureThreat - wastedTurnCost + leadRiskBonus;
  return net;
}

// ── FIXED PRICE CALCULATOR ───────────────────────
// v10 改進（LV4+）：估算各對手的 aiMax，找出「至少讓 1 人買，同時最大化利潤」的甜蜜點
// LV1-3 維持原有 buyerMax 公式
// 也考慮「風險分散」：若此畫家對多個對手都有威脅（他們持有量高），
// 賣家定價太貴可能讓威脅性對手輕易買走，應略微保守
function aiFixedPrice(cards, sellerPid){
  const card   = cards[0];
  const ev     = artistEV(card.ai, 1);
  const n      = G.n;
  const seller = G.players[sellerPid];

  // LV1-3: 原有公式（buyerMax × targetMargin）
  if(C.diff==='easy'||C.diff==='normal'||C.diff==='hard'){
    const buyerMax     = (ev.pPlace * (ev.cv + 25)) / Math.max(0.1, 1+ev.pPlace) * 1.3;
    const targetMargin = 0.75 + (n-3)*0.05;
    let price          = Math.floor(buyerMax * targetMargin);
    const selfBreakEven= Math.floor(ev.pPlace * (ev.cv + 25));
    price = Math.max(price, Math.floor(selfBreakEven * 0.65));
    price = Math.min(price, seller.money, 80);
    price = Math.max(price, 5);
    const adjFactor = {easy:0.55, normal:0.74, hard:0.90}[C.diff];
    return Math.max(5, Math.floor(price * adjFactor));
  }

  // LV4-5：跨對手 aiMax 感知定價
  // Step 1: 估算每位對手對這張牌的理性出價上限
  const opponentMaxes = G.players
    .map((p,i)=>({ pid:i, p, mx: i===sellerPid ? 0 : aiMax(p, card, false) }))
    .filter(x=>x.pid!==sellerPid);

  // Step 2: 按出價意願排序，找出讓「至少 1 人購買」的最高可行定價
  // 排序：aiMax 由高到低
  opponentMaxes.sort((a,b)=>b.mx-a.mx);

  // 最高願意支付的對手之 aiMax 是理論上限
  const highestBuyerMax = opponentMaxes[0]?.mx || 10;

  // Step 3: 風險分散考量
  // 若最願意買的對手持有 2+ 張同畫家，賣給他是「幫助威脅方」
  // 這種情況下，賣家應考慮定價稍高，讓他不那麼容易買走
  // 但同時也有「賺到錢」的正向，所以只微調（±10%）
  const topBuyer     = opponentMaxes[0];
  let riskAdjust     = 1.0;
  if(topBuyer && C.diff==='expert'){
    const topBuyerOwned = topBuyer.p.bought.filter(c=>c.ai===card.ai).length;
    // 若最高出價者持有 2+，他買了會更難被超越，略微提高售價讓其他人買
    if(topBuyerOwned >= 2) riskAdjust = 1.08;
  }
  if(topBuyer && C.diff==='genius'){
    const topBuyerOwned = topBuyer.p.bought.filter(c=>c.ai===card.ai).length;
    // LV5 更精細：考量誰買對我們威脅最小
    const leastThreatBuyer = [...opponentMaxes]
      .sort((a,b)=>a.p.bought.filter(c=>c.ai===card.ai).length - b.p.bought.filter(c=>c.ai===card.ai).length)[0];
    // 若最高出價者和威脅最小者不同，稍微抬高售價把牌賣給威脅較小的人
    if(leastThreatBuyer && leastThreatBuyer.pid !== topBuyer.pid){
      // 定價在「第二高出價者剛好能買，最高者也能買」的甜蜜點
      riskAdjust = 0.97; // 略低讓更多人能買，從中選最不危險的
    }
    if(topBuyerOwned >= 2) riskAdjust *= 1.10;
  }

  // Step 4: 定價 = 最高 buyerMax 的 88-95%（確保他願意買），並加入 riskAdjust
  const targetPct = C.diff==='genius' ? 0.92 : 0.88;
  let price = Math.floor(highestBuyerMax * targetPct * riskAdjust);

  // 安全下限：強制自購不虧太多
  const selfBreakEven = Math.floor(ev.pPlace * (ev.cv + 25));
  price = Math.max(price, Math.floor(selfBreakEven * 0.65));
  price = Math.min(price, seller.money, 80);
  price = Math.max(price, 5);

  return price;
}

// ── CARD PLAY SCORER ─────────────────────────────
function aiPlayCard(pid){
  const ai  = G.players[pid];
  const rnd = G.round;

  // Pre-compute: does this player have any "pushable" artist (out>=1, has 2+ cards in hand)?
  const pushableArtists = ARTISTS.map((_,aix)=>{
    const out = G.rOut[aix];
    const inHand = ai.hand.filter(c=>c.ai===aix).length;
    return (out>=1 && inHand>=2) ? aix : -1;
  }).filter(x=>x>=0);
  const hasPushOption = pushableArtists.length > 0;

  const scored = ai.hand.map(card=>{
    let s = 0;
    const aix     = card.ai;
    const out     = G.rOut[aix];
    const cv      = G.mvals[aix].reduce((a,b)=>a+b,0);
    const owned   = ai.bought.filter(c=>c.ai===aix).length;
    const handSame= ai.hand.filter(c=>c.ai===aix).length;
    const ev      = artistEV(aix, 1);

    // ── CONCENTRATION PENALTY ────────────────────
    const concMult = rnd<=2 ? 0.15 : 0.30;
    if(out>=3) s -= (out-2)*6*concMult;

    // ── CALL ROUND ───────────────────────────────
    // v10：整體 callRoundValue 閾值降低約 15%，讓 call round 更容易觸發
    // LV1-4 各有明顯差距；LV4/5 加入更精準的時機條件
    // 同時考量：前幾輪若浪費出牌造成第四輪手牌不足 → 第四輪強制提升 call 意願
    if(out===4){
      if(C.diff==='easy'){
        // LV1：35% 機率觸發（原 30%，+5%），偶爾隨機 call
        s += Math.random()<0.35 ? 10 : -2;
      } else if(C.diff==='normal'){
        // LV2：callMult 提高，整體更願意 call，但仍不太精算
        const callMult = [0, 0.55, 0.72, 0.82, 0.92][rnd]||0.92;
        const crv = aiCallRoundValue(ai, card);
        // 降低觸發閾值：原本 crv>0 才 call，現在 crv>-5 就考慮
        s += crv > -5 ? crv * callMult * 1.15 : crv * 0.5;
      } else if(C.diff==='hard'){
        // LV3：callMult 略提升，降低負值的抑制作用
        const callMult = [0, 0.58, 0.75, 0.85, 0.92][rnd]||0.92;
        const crv = aiCallRoundValue(ai, card);
        s += crv * callMult * 1.12;
      } else if(C.diff==='expert'){
        // LV4：精確評估 + 特殊時機加分
        // 條件一：第四輪手牌嚴重不足時（≤ 2 張），無論如何都更傾向 call
        const handShortage = ai.hand.length <= 2 && rnd === 4;
        const callMult = [0, 0.60, 0.78, 0.88, 0.94][rnd]||0.94;
        const crv = aiCallRoundValue(ai, card);
        // 手牌不足加成：第四輪沒牌打，call round 提前結算比拿爛牌好
        const shortageBonus = handShortage ? 12 : 0;
        // LV4 特殊時機：若此畫家在本輪已入圍且我持有 ≥ 2 張，強力加分
        const wellPositioned = owned >= 2 && G.rOut[aix] >= 3;
        const positionBonus = wellPositioned ? 8 : 0;
        s += (crv + shortageBonus + positionBonus) * callMult * 1.10;
      } else {
        // LV5 天才：最精準評估 + 全局時機感知
        const callMult = [0, 0.62, 0.80, 0.90, 0.96][rnd]||0.96;
        const crv = aiCallRoundValue(ai, card);
        // 天才特殊時機一：對手資金領先我 ≥ 40，call round 截斷對手收益
        const oppMaxMoney = Math.max(...G.players.filter((_,i)=>i!==pid).map(p=>p.money));
        const moneyPressure = oppMaxMoney - ai.money >= 40 ? 10 : 0;
        // 天才特殊時機二：這是第四輪且場面對我有利（持有量最多）
        const myBoughtAi = ai.bought.filter(c=>c.ai===aix).length;
        const maxOppBoughtAi = Math.max(0,...G.players.filter((_,i)=>i!==pid).map(p=>p.bought.filter(c=>c.ai===aix).length));
        const dominanceBonus = (rnd===4 && myBoughtAi > maxOppBoughtAi) ? 10 : 0;
        // 手牌不足（第四輪）
        const handShortage = ai.hand.length <= 2 && rnd === 4 ? 8 : 0;
        s += (crv + moneyPressure + dominanceBonus + handShortage) * callMult * 1.08;
      }
    }

    // ── NEW ARTIST BONUS (hand-context-aware) ────
    if(out===0){
      if(rnd<=2){
        if(hasPushOption){
          // I have better options — penalise opening a new door
          s -= (C.diff==='easy'||C.diff==='normal') ? 2 : 8;
        } else {
          // No good push options, so opening is acceptable
          s += cv>0 ? 6 : (2+Math.random()*4);
        }
      } else {
        // Late rounds: strongly prefer artists already established
        const openVal = cv>20 ? 3 : cv>0 ? -4 : -12;
        s += openVal;
        if(hasPushOption) s -= 5; // extra penalty if push option exists
      }
    }
    // Small nudge toward less-played artists in rounds 1-2 only
    if(rnd<=2 && out===1 && !hasPushOption) s += 3;

    // ── PUSH OWNED ARTISTS ───────────────────────
    if(owned>0 && out<4) s += owned*(3+out*1.2);

    // ── DOUBLE CARDS — 重新設計時機評估（v10）─────
    if(card.type==='double'){
      const outAfterDouble = out + 1;

      // LV1-2：早期輕微扣分（懶得算），晚期隨機出
      if(C.diff==='easy'){
        s += rnd<=2 ? -3 : 4 + Math.random()*5;
      } else if(C.diff==='normal'){
        s += rnd<=2 ? -6 : 3 + cv*0.06;
      } else {
        // LV3-5：完整的主動 Double 時機判斷
        // ─ 條件一：是否有補牌能力（自己有同畫家非 Double 牌）
        const hasPartner = ai.hand.some(c=>c.ai===aix&&c.type!=='double');
        // ─ 條件二：場上時機（2-3 張是最佳出 Double 視窗）
        const inGoodWindow = out >= 2 && out <= 3;
        // ─ 條件三：我持有量夠確保入圍（持有 ≥ 2 更穩）
        const wellInvested = owned >= 2 || (owned>=1 && cv>=20);
        // ─ 條件四：出 Double 後達 4 張，任何人補牌即 call round
        //   → 需要評估這個 call round 對我是否有利
        const willHitFour = outAfterDouble === 4;
        // ─ 條件五：對手手上有同畫家牌（他們可以補牌，改變 call round 時機）
        const oppHandSame = G.players.filter((_,i)=>i!==pid)
          .reduce((sum,p)=>sum+p.hand.filter(c=>c.ai===aix).length, 0);

        // 基礎分：有時機視窗加分，沒有扣分
        s += inGoodWindow ? (4 + cv*0.08 + ev.rawEV*0.05) : (rnd<=2 ? -14 : 2);

        // 補牌能力：沒有 partner 大扣分（孤 Double 無法主動補牌）
        if(!hasPartner) s -= 9;

        // 主動出 Double 加分條件：補牌能力 + 充足投資 + 好時機
        if(hasPartner && wellInvested && inGoodWindow) s += 10;

        // 會達到 4 張的情境：精細評估
        if(willHitFour){
          // 近似 call round value（out 此時是 3，我們假設出牌後會是 4）
          const callIsGood = wellInvested && (myTotalGain_approx(player, aix, snapshot_approx()) > 0);
          if(callIsGood) s += 8;  // 主動觸發有利的 call round
          else s -= 10;           // 可能觸發不利的 call round

          // 對手手上有牌 → 他們可以補牌成拍賣人，奪走控制權
          if(oppHandSame > 0 && C.diff!=='easy'){
            // 若我投資充足，對手補牌反而讓我受益（他們當拍賣人收錢，但我持有的畫也會結算）
            if(wellInvested) s -= oppHandSame * 2; // 輕微扣分（失去控制但我也有牌）
            else s -= oppHandSame * 5;              // 重扣（我沒牌，對手掌控 call round）
          }
        }

        // 三張時出 Double（outAfterDouble=4）是最高風險也最高報酬的時機
        if(out === 3){
          // 任何人補牌就 call round，需特別謹慎
          if(!wellInvested) s -= 8; // 我投資不足時不應冒這個風險
        }
      }
    }

    // ── HAND MANAGEMENT (LV3+) + 一步前瞻序列評估（v10）─────
    if(C.diff==='hard'||C.diff==='expert'||C.diff==='genius'){
      // 避免孤 Double 衝上 4 張（前面已處理，此為輔助）
      if(card.type==='double'){
        const hasPartner = ai.hand.some(c=>c.ai===aix&&c.type!=='double');
        if(!hasPartner) s -= 4; // 輕微追加，不重複計算
      }
      // Avoid being 1 card away from someone else calling round on us
      if(out===3 && handSame>=2) s -= 7;
      // Last round: prioritize high-EV cards
      if(rnd===4) s += ev.rawEV * 0.22;
      // Multi-round planning: moderate-cv artists are sweet spot
      if(cv>=10&&cv<=40&&out<3) s += 4;
      if(rnd>=3&&owned>0) s += owned*5;

      // ── 一步前瞻序列評估（LV4+）──
      // 評分：出這張牌後，手上剩餘牌中最好的那張的 rawEV 乘以折扣係數
      // 目的：讓 AI 感知「現在出 Open 為之後的 Double 鋪路」的序列價值
      // 例：手上有 Open + Double（同畫家），Open 評分時加入「之後 Double 更值錢」的前瞻加分
      if(C.diff==='expert'||C.diff==='genius'){
        // 模擬出這張牌後的手牌
        const handAfter = ai.hand.filter((_,i)=>ai.hand[i]!==card);
        if(handAfter.length > 0){
          // 找出 handAfter 中同畫家的最優後續牌
          const bestFollowUp = handAfter
            .filter(c=>c.ai===aix) // 同畫家後續
            .map(c=>{
              let followScore = 0;
              // Double 作為後續牌，若出這張 Open 後 out 會增加，Double 的時機更好
              if(c.type==='double'){
                const outAfterThis = out + 1; // 出了這張之後
                // 序列加分：出 Open/Once 後再出 Double，比直接出 Double 更有策略價值
                if(card.type!=='double' && outAfterThis>=2 && outAfterThis<=3){
                  followScore += 8 + cv*0.08; // Open→Double 組合加分
                }
              }
              return followScore;
            })
            .reduce((max,v)=>Math.max(max,v), 0);
          // 一步前瞻：35% 折扣加到當前牌的分數
          s += bestFollowUp * 0.35;
        }
      }
    }

    // ── GENIUS EXTRAS ────────────────────────────
    if(C.diff==='genius'){
      const oppBought = G.players.filter((_,i)=>i!==pid)
        .reduce((sum,p)=>sum+p.bought.filter(c=>c.ai===aix).length, 0);
      if(oppBought>0) s += oppBought*4;
      const bigOppHolder = G.players.some(
        (p,i)=>i!==pid && p.bought.filter(c=>c.ai===aix).length>=2
      );
      if(bigOppHolder && out===4){
        if(owned>=1) s += 12;
        else s += 5;
      }
      const totalHandCards = G.players.reduce((s,p)=>s+p.hand.length,0);
      const approxTurnsLeft = Math.floor(totalHandCards/G.n);
      if(approxTurnsLeft<=3 && ev.rawEV>15) s += 8;

      // ── 精細截斷時機（v10 中期改進）──
      // 截斷：主動出某畫家的牌，加速到 5 張結束本輪，阻止對手下輪繼續賣牌
      // 最佳截斷視窗：場上 3-4 張 + 對手持有 ≥ 2 張 + 我自己 ≤ 1 張（否則是自傷）
      // 玩家的風險：截斷本身也讓當前輪提前結束，若我自己有在這輪要賣的高 EV 牌，
      // 截斷會讓我損失那些出牌機會（wastedTurnCost 概念）
      const maxOppHoldingAi = Math.max(0, ...G.players
        .filter((_,i)=>i!==pid)
        .map(p=>p.bought.filter(c=>c.ai===aix).length));
      const inCutoffWindow = out >= 3 && out <= 4 && maxOppHoldingAi >= 2 && owned <= 1;
      if(inCutoffWindow){
        // 估算截斷代價：我的手牌中還有多少高 EV 牌尚未出？
        const myPendingEV = ai.hand
          .filter(c=>c.ai!==aix) // 排除被截斷畫家的牌
          .reduce((sum,c)=>sum + artistEV(c.ai,1).rawEV, 0);
        const cutoffCost = Math.min(15, myPendingEV * 0.15); // 損失出牌機會的代價
        // 截斷收益：阻止對手下輪拿到 ~rawEV × oppHolding 的收益
        const cutoffBenefit = maxOppHoldingAi * artistEV(aix,0).rawEV * 0.4;
        // 淨效益為正才截斷
        if(cutoffBenefit > cutoffCost){
          s += (cutoffBenefit - cutoffCost) * 0.5; // 折半加分（仍是近似評估）
        }
      }
    }

    // ── SYNERGY ──────────────────────────────────
    s += Math.min(handSame,2)*1.5;

    // ── NOISE ─────────────────────────────────────
    const noiseMult = rnd<=2 ? 1.8 : rnd===3 ? 1.0 : 0.6;
    s += Math.random()*{easy:18,normal:10,hard:4,expert:2,genius:1.0}[C.diff]*noiseMult;

    return {card, s};
  });

  scored.sort((a,b)=>b.s-a.s);
  let chosen = scored[0].card;

  // ── FORCED-PLAY FALLBACK (LV3+) ──────────────
  if((C.diff==='hard'||C.diff==='expert'||C.diff==='genius') && G.rOut[chosen.ai]===4){
    const crv = aiCallRoundValue(ai, chosen);
    if(crv < -5){
      const safePicks = scored.filter(x=>G.rOut[x.card.ai]<4);
      if(safePicks.length>0){
        chosen = safePicks[0].card;
      }
    }
  }

  ai.hand.splice(ai.hand.indexOf(chosen),1);
  ai.hand.sort((a,b)=>a.ai-b.ai);
  initiatePlay(chosen, pid);
}

// ── 輔助函數：近似 call round 收益（供 Double 評估用）──────
function myTotalGain_approx(player, triggerAi, snapshot){
  const pid  = G.players.indexOf(player);
  const cv   = G.mvals[triggerAi].reduce((a,b)=>a+b,0);
  const rank = snapshot.findIndex(x=>x.oai===triggerAi);
  const val  = rank>=0&&rank<=2 ? RVAL[rank] : 0;
  return player.bought.filter(c=>c.ai===triggerAi).length * (cv + val);
}
function snapshot_approx(){
  return ARTISTS.map((_,oai)=>({oai, cnt:G.rOut[oai], aOut:G.aOut[oai]}))
    .filter(x=>x.cnt>0)
    .sort((a,b)=>b.cnt-a.cnt || a.aOut-b.aOut);
}

// ══ AFTER AUCTION / ROUND END ══════════════════
function afterAuction(sid){
  G.auction=null;clearTmr();clearAutoPass();hideBidControls();renderAll();advanceTurn();
}

// Record earnings for item 8 — call when a sale completes
// sellerPid earns +price, buyerPid pays -price (unless same, then bank pays)
function recordEarning(sellerPid,buyerPid,price){
  if(!G.roundEarnings) return;
  if(sellerPid!==buyerPid) G.roundEarnings[sellerPid]+=price;
  G.roundEarnings[buyerPid]-=price;
}
function advanceTurn(){G.turnIdx=(G.turnIdx+1)%G.n;setTimeout(nextTurn,350);}
function roundEndCheck(card){
  if(G.rOut[card.ai]>=5){
    // Item 4: brief ceremony pause before modal
    addLog(`★ ${as(card.ai)} 第5張！本回合結束`,false,true);
    phase='end';
    // Show a flash notification on the auction board
    document.getElementById('ac-title').textContent=`${ARTISTS[card.ai]} — 第 ${G.round} 回合結束！`;
    document.getElementById('ac-body').innerHTML=`
      <div style="text-align:center;padding:1rem .5rem">
        <div style="font-family:'Playfair Display',serif;font-size:1.4rem;color:${ACOL[card.ai]};margin-bottom:.5rem">${ARTISTS[card.ai]}</div>
        <div style="font-size:.85rem;color:var(--ink2);margin-bottom:.3rem">第5張畫出現，本回合結束</div>
        <div style="font-size:.72rem;color:var(--ink3)">正在計算排名…</div>
      </div>`;
    setTimeout(endRound, 1800); // longer pause for drama
    return true;
  }
  return false;
}

function endRound(){
  clearTmr();clearAutoPass();hideBidControls();
  const ranked=ARTISTS.map((_,ai)=>({ai,cnt:G.rOut[ai]})).filter(x=>x.cnt>0).sort((a,b)=>b.cnt-a.cnt||a.ai-b.ai);
  let rankMsg='';
  ranked.forEach((x,r)=>{const v=RVAL[r]||0;G.mvals[x.ai].push(v);if(r<3&&v>0)rankMsg+=`${ARTISTS[x.ai]}:$${v} `;});
  ARTISTS.forEach((_,ai)=>{if(G.mvals[ai].length<G.round)G.mvals[ai].push(0);});
  addLog(`本輪 — ${rankMsg||'無排名'}`,false,true);
  const payouts=G.players.map(p=>{
    let e=0;p.bought.forEach(c=>{const r=ranked.findIndex(x=>x.ai===c.ai);if(r>=0&&r<3)e+=G.mvals[c.ai].reduce((a,b)=>a+b,0);});return e;
  });
  G.players.forEach((p,i)=>{if(payouts[i]>0)addLog(`${ns(p)} 收回 $${payouts[i]}`);p.money+=payouts[i];p.bought=[];});
  G.rOut=ARTISTS.map(()=>0);

  // Round summary modal — show player's own gain + total, hide others' totals (item 3 fix)
  const me=G.players[0];const myGain=payouts[0];
  const medals=['🥇','🥈','🥉',''];
  // Rank by gain this round (not total money)
  const byGain=[...G.players].map((p,i)=>({p,i,gain:payouts[i]})).sort((a,b)=>b.gain-a.gain);
  const summaryRows=byGain.map((x,rank)=>{
    const showTotal=x.i===0; // only show total for human player
    return `<div class="rs-row${x.gain>0?' gain':''}">
      <div class="rs-rank" style="background:${rank===0?'#B8912A':rank===1?'#8A9BA8':rank===2?'#9A7B5A':'rgba(0,0,0,.2)'}">${medals[rank]||rank+1}</div>
      <div class="rs-name" style="color:${x.p.color}">${x.p.name}${x.p.human?' 👤':''}</div>
      ${x.gain>0?`<div class="rs-gain">+$${x.gain}</div>`:`<div class="rs-zero">$0</div>`}
      ${showTotal?`<div style="margin-left:auto;font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:700;color:var(--gold);opacity:.8">→ $${x.p.money}</div>`:'<div style="margin-left:auto;font-size:.72rem;color:var(--ink3)">---</div>'}
    </div>`;
  }).join('');
  const artistSummary=ranked.slice(0,3).map((x,r)=>`<span style="color:${ACOL[x.ai]};font-weight:700">${ARTISTS[x.ai]}</span><span style="color:var(--ink3);font-size:.75rem"> +$${RVAL[r]}</span>`).join(' &nbsp;›&nbsp; ');

  if(G.round>=4){setTimeout(()=>{phase='end';showResult();},800);return;}
  G.round++;dealRound();
  G.roundEarnings=Array.from({length:G.n},()=>0); // reset for new round
  // Rule: new round starts with player AFTER the one who ended the round
  // G.turnIdx currently points to the player who just triggered round end
  const nextStarter=(G.turnIdx+1)%G.n;
  document.getElementById('m-icon').textContent='🔔';
  document.getElementById('m-title').textContent=`第 ${G.round-1} 回合結束`;
  document.getElementById('m-body').innerHTML=`<div style="margin-bottom:.3rem">本輪排名：</div><div style="font-size:.88rem;line-height:1.9">${artistSummary||'無排名'}</div>`;
  document.getElementById('m-extra').innerHTML=`<div class="rs-header">本輪收益排行</div>${summaryRows}`;
  document.getElementById('m-btns').innerHTML=`<button class="mbtn pri" onclick="closeModal();renderAll();phase='play';G.turnIdx=${nextStarter};nextTurn()">第 ${G.round} 回合開始 →</button>`;
  document.getElementById('modal').classList.add('show');
}

function showResult(){
  const sorted=[...G.players].sort((a,b)=>b.money-a.money);
  const medals=['🥇','🥈','🥉',''];

  // Player rankings
  const playerRows=sorted.map((p,i)=>{
    return `<div class="res-row${i===0?' winner':''}">
      <div class="rr-rk" style="background:${i===0?'#B8912A':i===1?'#8A9BA8':i===2?'#9A7B5A':'rgba(255,255,255,.1)'};color:white">${medals[i]||i+1}</div>
      <div class="rr-info"><div class="rr-name" style="color:${p.color}">${p.name}${p.human?' 👤':''}</div></div>
      <div class="rr-money">$${p.money}</div>
    </div>`;
  }).join('');

  // Artist stats — total value accumulated and total cards played
  const artistStats=ARTISTS.map((_,ai)=>{
    const totalVal=G.mvals[ai].reduce((a,b)=>a+b,0);
    const roundVals=G.mvals[ai].map((v,r)=>`<span style="font-size:.58rem;padding:1px 4px;border-radius:3px;background:${v===30?'#B8912A22':v===20?'#6A8AA422':v===10?'#8A7B5A22':'transparent'};color:${v>0?ACOL[ai]:'var(--ink3)'}">${v||'·'}</span>`).join('');
    return `<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem .5rem;border-radius:7px;background:rgba(255,255,255,.04);margin-bottom:.28rem">
      <div style="width:10px;height:10px;border-radius:50%;background:${ACOL[ai]};flex-shrink:0"></div>
      <div style="font-family:'Playfair Display',serif;font-size:.82rem;color:rgba(255,255,255,.78);flex:1">${ARTISTS[ai]}</div>
      <div style="display:flex;gap:3px;align-items:center">${roundVals}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:${totalVal>0?ACOL[ai]:'rgba(255,255,255,.25)'};min-width:36px;text-align:right">${totalVal>0?'$'+totalVal:'—'}</div>
    </div>`;
  }).join('');

  document.getElementById('res-list').innerHTML=`
    ${playerRows}
    <div style="margin-top:1.2rem;margin-bottom:.4rem;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3)">畫家累積價值</div>
    ${artistStats}`;
  showScreen('result');
}

// ══ TIMER / AUTOPASS ═══════════════════════════
function clearAutoPass(){if(autoPassTimer){clearTimeout(autoPassTimer);autoPassTimer=null;}}
function clearTmr(){if(timerID){clearInterval(timerID);timerID=null;}}

// ══ LOG HELPERS ════════════════════════════════
// ns = name span, as = artist span
function ns(p){return`<span style="color:${p.color};font-weight:600">${p.name}</span>`;}
function as(ai){return`<span style="color:${ACOL[ai]};font-weight:700">${ARTISTS[ai]}</span>`;}
function addLog(html,mine=false,sys=false,won=false,sold=false){
  const el=document.getElementById('log');if(!el)return;
  const d=document.createElement('div');
  let cls='log-line';
  if(won)cls+=' won';else if(sold)cls+=' sold';else if(mine)cls+=' mine';else if(sys)cls+=' sys';
  d.className=cls;d.innerHTML=`<div class="log-dot"></div><span>${html}</span>`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  while(el.children.length>80)el.removeChild(el.firstChild);
}

// ══ MODAL ══════════════════════════════════════
function showModal(icon,title,body,extra,btns){
  document.getElementById('m-icon').textContent=icon;
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-body').textContent=body;
  document.getElementById('m-extra').innerHTML=extra||'';
  document.getElementById('m-btns').innerHTML=btns;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
window.closeModal=closeModal;
function confirmQuit(){
  showModal('🚪','退出遊戲','確定退出？進度不會儲存。','',
    `<button class="mbtn sec" onclick="closeModal()">繼續遊戲</button><button class="mbtn red" onclick="location.reload()">退出</button>`);
}
</script>
