<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Modern Art — Demo v5</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#18160F;--ink2:#3D3A30;--ink3:#8A8070;
  --gold:#C49A1E;--gold2:#E2B530;--goldl:#FDF3CC;
  --cream:#FDFAF3;--cream2:#F4EDD8;--cream3:#E4D9C0;
  --dark:#1A1814;--dark2:#252015;--dark3:#302C1C;
  --red:#C03030;--green:#1E7A48;
  --r:10px;--r2:16px;
  /* Player name colors - distinct from artist colors */
  --pn0:#1560B8;--pn1:#7B3590;--pn2:#A02020;--pn3:#166038;--pn4:#B06010;
}
body{background:var(--cream);color:var(--ink);font-family:'Outfit',sans-serif;font-size:14px;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── SETUP ── */
#setup{background:var(--dark);align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
#setup::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent 0 40px,rgba(196,154,30,.025) 40px 41px);pointer-events:none}
.sw-wrap{max-width:480px;width:100%;position:relative;z-index:1}
.sw-logo{font-family:'Cormorant Garamond',serif;font-size:3.2rem;color:var(--gold2);letter-spacing:.04em;line-height:1;margin-bottom:.1rem}
.sw-sub{color:rgba(255,255,255,.25);font-size:.75rem;letter-spacing:.13em;text-transform:uppercase;margin-bottom:2rem}
.sl{color:rgba(255,255,255,.38);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;margin:.1rem 0 .55rem;margin-top:1.3rem}
.pill-row{display:flex;gap:.4rem}
.pill{flex:1;padding:.52rem;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.38);border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;transition:all .18s}
.pill.on{background:rgba(196,154,30,.18);border-color:var(--gold2);color:var(--gold2);font-weight:600}
.diff-list{display:flex;flex-direction:column;gap:.32rem}
.diff-item{padding:.58rem .9rem;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);border-radius:8px;cursor:pointer;color:rgba(255,255,255,.42);font-size:.8rem;transition:all .18s;display:flex;align-items:center;gap:.65rem}
.diff-item.on{border-color:var(--gold2);background:rgba(196,154,30,.1);color:var(--gold2)}
.go-btn{margin-top:1.8rem;width:100%;padding:.95rem;background:var(--gold);border:none;border-radius:10px;color:var(--dark);font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;letter-spacing:.05em;transition:all .2s}
.go-btn:hover{background:var(--gold2);transform:translateY(-1px)}

/* ── GAME ── */
#game{background:#EDEADF;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--dark);display:flex;align-items:center;gap:.7rem;padding:.42rem .8rem;flex-shrink:0}
.tb-logo{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--gold2)}
.tb-chip{background:rgba(255,255,255,.07);border-radius:5px;padding:.18rem .55rem;font-size:.68rem;color:rgba(255,255,255,.45);letter-spacing:.05em}
.tb-sp{flex:1}
.ev-row{display:flex;align-items:center;gap:.35rem;cursor:pointer;user-select:none;font-size:.68rem;color:rgba(255,255,255,.4)}
.sw-tog{width:26px;height:15px;background:rgba(255,255,255,.12);border-radius:99px;position:relative;transition:background .2s;flex-shrink:0}
.sw-tog.on{background:var(--gold)}
.sw-tog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:white;transition:transform .2s}
.sw-tog.on::after{transform:translateX(11px)}
.tb-btn{padding:.27rem .65rem;border:1px solid rgba(255,255,255,.1);border-radius:5px;background:transparent;color:rgba(255,255,255,.38);font-family:'Outfit',sans-serif;font-size:.68rem;cursor:pointer;transition:all .15s}
.tb-btn:hover{color:rgba(255,255,255,.68);border-color:rgba(255,255,255,.28)}
.game-body{flex:1;display:grid;grid-template-rows:auto 1fr auto;overflow:hidden;gap:.45rem;padding:.45rem .55rem 0}

/* MARKET */
.mboard{display:grid;grid-template-columns:repeat(5,1fr);gap:.32rem}
.a-tile{background:#FFFEF8;border-radius:var(--r);overflow:hidden;border:1px solid var(--cream3);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.a-head{padding:.3rem .4rem;display:flex;align-items:baseline;justify-content:space-between;gap:.2rem}
.a-hname{font-family:'Playfair Display',serif;font-size:.7rem;color:white;letter-spacing:.01em;line-height:1.15}
.a-hval{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.95);white-space:nowrap;flex-shrink:0}
.a-body{padding:.2rem .4rem .18rem}
.a-cnt-row{display:flex;align-items:baseline;gap:.18rem}
.a-cnt{font-size:1.3rem;font-weight:700;line-height:1}
.a-max{font-size:.58rem;color:var(--ink3)}
.a-total{font-size:.58rem;color:var(--ink3);display:block;margin-top:1px}
.a-pips{display:flex;gap:2px;margin:.22rem 0 .1rem}
.pip{width:8px;height:8px;border-radius:50%;background:#E0D8C8;transition:all .3s}
.pip.out{background:currentColor}
.a-rounds{display:flex;gap:2px;padding:.2rem .4rem;background:#F5F0E4;border-top:1px solid var(--cream3)}
.rchip{flex:1;text-align:center;font-size:.56rem;font-weight:600;border-radius:3px;padding:1px 0;color:white;background:rgba(0,0,0,.14)}
/* Estimated round value — dashed border to signal uncertainty */
.a-est{font-size:.58rem;font-weight:600;color:var(--ink3);margin-left:auto;padding:1px 4px;border:1px dashed var(--ink3);border-radius:4px;letter-spacing:.02em;white-space:nowrap;opacity:.75}

/* CENTER grid: players | auction | bid-col */
.center{display:grid;grid-template-columns:160px 1fr 168px;gap:.45rem;overflow:hidden}

/* PLAYER COLUMN */
.player-col{display:flex;flex-direction:column;gap:.3rem;overflow-y:auto}
.p-tile{background:#FFFEF8;border-radius:var(--r);padding:.4rem .48rem;border:2px solid var(--cream3);transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.p-tile.cur{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 2px 8px rgba(196,154,30,.18)}
.p-tile.human-tile{background:linear-gradient(135deg,#FEFAF0,#FFFEF8);border-color:#D4C090}
.pt-top{display:flex;align-items:center;gap:.4rem;margin-bottom:.22rem}
.pt-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:white;flex-shrink:0}
/* player name: larger, darker, clearly readable */
.pt-name{font-size:.88rem;font-weight:700;line-height:1.15;color:var(--ink)}
.pt-sub{font-size:.6rem;color:var(--ink3);line-height:1.2;margin-top:1px}
/* Big prominent money display — inline with name */
.pt-money-inline{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--gold);line-height:1;letter-spacing:.01em;white-space:nowrap}
/* Thinking bubble for AI players */
.pt-thinking{display:flex;gap:3px;padding:.3rem .4rem;margin-top:.2rem}
.pt-thinking span{width:6px;height:6px;border-radius:50%;background:var(--ink3);animation:thinkpulse 1s ease-in-out infinite}
.pt-thinking span:nth-child(2){animation-delay:.2s}
.pt-thinking span:nth-child(3){animation-delay:.4s}
@keyframes thinkpulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.pt-arts{display:flex;flex-wrap:wrap;gap:2px;min-height:12px}
.abadge{font-size:.58rem;padding:1px 5px;border-radius:4px;font-weight:600}
/* Collected cards display - bigger */
.pt-collection{display:flex;flex-wrap:wrap;gap:3px;margin-top:.25rem}
.coll-card{width:24px;height:36px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;color:white;box-shadow:0 1px 4px rgba(0,0,0,.3);flex-shrink:0}
.coll-card .cc-a{font-size:.6rem;font-weight:700;text-align:center;line-height:1}

/* AUCTION CENTER */
.abox{background:#FFFEF8;border-radius:var(--r2);border:1px solid var(--cream3);display:flex;flex-direction:column;overflow:hidden;min-height:0;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.abox-head{background:var(--dark3);padding:.48rem .75rem;display:flex;align-items:center;gap:.45rem;flex-shrink:0}
.abox-title{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold2);flex:1}
.atype-bdg{font-size:.62rem;font-weight:600;padding:.18rem .5rem;border-radius:99px}
.timer-track{height:3px;background:rgba(0,0,0,.2);overflow:hidden;flex-shrink:0}
.timer-fill{height:100%;background:var(--gold);transition:width .5s linear}
.timer-fill.urgent{background:var(--red)}
.abox-body{flex:1;padding:.6rem .65rem;overflow-y:auto;display:flex;flex-direction:column;gap:.42rem;min-height:0}

/* live bid banner */
.live-bid-banner{background:linear-gradient(135deg,var(--dark3),#1A1810);border-radius:8px;padding:.42rem .65rem;display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.lbb-left{display:flex;flex-direction:column;gap:0}
.lbb-label{font-size:.6rem;color:rgba(255,255,255,.38);letter-spacing:.07em;text-transform:uppercase}
.lbb-amount{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--gold2);line-height:1}
.lbb-leader{font-size:.72rem;color:rgba(255,255,255,.58);margin-left:auto;text-align:right;line-height:1.4}
.lbb-leading-you{font-size:.68rem;color:#58E8A0;font-weight:600;margin-left:auto}

/* painting card display */
.pcards-row{display:flex;gap:.5rem;flex-wrap:wrap}
.pcard{width:68px;height:98px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.38rem;color:white;font-size:.6rem;font-weight:600;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.25);flex-shrink:0;position:relative;transition:transform .3s,box-shadow .3s}
.pcard.fly-out{transform:scale(.85) translateY(-6px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.pcard .pc-a{font-family:'Playfair Display',serif;font-size:.72rem;font-weight:700;margin-bottom:3px;line-height:1.1}
.pcard .pc-t{font-size:.56rem;opacity:.82}
.pcard .pc-ev{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:.55rem;background:rgba(0,0,0,.38);border-radius:0 0 7px 7px;padding:2px}

/* bid history */
.bid-hist{display:flex;flex-direction:column;gap:2px;max-height:64px;overflow-y:auto}
.bh-row{display:flex;align-items:center;gap:.35rem;font-size:.7rem;padding:.5px 0}
.bh-amt{font-weight:700;color:var(--gold)}

/* EV panel */
.ev-panel{background:var(--goldl);border-radius:8px;padding:.38rem .58rem;border:1px solid rgba(196,154,30,.28);flex-shrink:0}
.ev-title{font-size:.6rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--gold);margin-bottom:.22rem}
.ev-rows{display:flex;flex-direction:column;gap:2px}
.ev-r{display:flex;justify-content:space-between;font-size:.67rem}
.ev-l{color:var(--ink2)}
.ev-v{font-weight:600;color:var(--ink)}

/* BID COLUMN — anchored to bottom */
.bid-col{display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden}
.bid-col-inner{background:#FFFEF8;border-radius:var(--r2);border:1px solid var(--cream3);padding:.6rem .55rem .65rem;display:flex;flex-direction:column;gap:.48rem;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.bc-title{font-size:.65rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3)}
.bid-display{background:linear-gradient(135deg,var(--dark3),var(--dark2));border-radius:8px;padding:.45rem .4rem;text-align:center}
.bid-display-num{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:var(--gold2);line-height:1}
.bid-display-sub{font-size:.62rem;color:rgba(255,255,255,.38);margin-top:2px}
.step-grid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem}
.sbtn{padding:.52rem .3rem;border:1.5px solid #C8BFA8;background:#FDFAF3;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--ink2);transition:all .15s;font-family:'Outfit',sans-serif;text-align:center}
.sbtn:hover{background:var(--goldl);border-color:var(--gold);color:var(--gold)}
.sbtn:active{transform:scale(.92)}
.sbtn.neg{color:var(--red);border-color:#E0C0C0}
.sbtn.neg:hover{background:#FFF0F0;border-color:var(--red)}
.confirm-btn{padding:.62rem;background:var(--gold);border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--dark);transition:all .15s;width:100%;letter-spacing:.03em}
.confirm-btn:hover{background:var(--gold2);transform:translateY(-1px)}
.pass-btn{padding:.48rem;background:#EDE5D0;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--ink2);transition:all .15s;width:100%}
.pass-btn:hover{background:var(--cream3)}
.buy-btn{padding:.62rem;background:var(--green);border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;color:white;transition:all .15s;width:100%}
.buy-btn:hover{background:#227A50}
.bid-note{font-size:.68rem;color:var(--ink3);text-align:center;min-height:13px;line-height:1.4}

/* card fly animation */
@keyframes flyToPlayer{0%{opacity:1;transform:scale(1) translate(0,0)}70%{transform:scale(1.1) translate(var(--fx),var(--fy))}100%{opacity:0;transform:scale(.6) translate(var(--fx),var(--fy))}}
.pcard.flying{animation:flyToPlayer 1.2s ease-in-out forwards}

/* LOG */
.log-wrap{background:var(--dark2);height:100px;overflow-y:auto;padding:.35rem .7rem;flex-shrink:0;border-top:2px solid var(--dark)}
.log-line{font-size:.7rem;color:rgba(255,255,255,.3);line-height:1.9;display:flex;gap:.45rem;align-items:baseline}
.log-line.mine{color:rgba(226,181,48,.9)}
.log-line.sys{color:rgba(255,255,255,.72);font-weight:500}
.log-line.won{color:#58E8A0;font-weight:600}
.log-line.sold{color:#FFB040;font-weight:600}
.log-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;margin-top:7px}

/* HAND */
.hand{background:var(--dark3);padding:.42rem .55rem;flex-shrink:0;border-top:2px solid var(--dark)}
.hand-hdr{display:flex;align-items:center;gap:.7rem;margin-bottom:.38rem}
.hand-lbl{font-size:.62rem;color:rgba(255,255,255,.28);letter-spacing:.08em;text-transform:uppercase}
.hand-sp{flex:1}
.play-btn{padding:.32rem .95rem;background:var(--gold);border:none;border-radius:6px;color:var(--dark);font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.play-btn:hover:not(:disabled){background:var(--gold2)}
.play-btn:disabled{opacity:.28;cursor:not-allowed}
.hand-cards{display:flex;gap:.38rem;overflow-x:auto;padding-bottom:.2rem;justify-content:flex-end}
/* hand card: name moved UP, bigger overall */
.hcard{min-width:54px;height:84px;border-radius:7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;padding:.28rem .28rem .22rem;color:white;box-shadow:0 2px 6px rgba(0,0,0,.3);transition:transform .15s,box-shadow .15s,border-color .15s;flex-shrink:0;border:2px solid transparent;position:relative;justify-content:flex-start;padding-top:.55rem}
.hcard:hover{transform:translateY(-5px);box-shadow:0 6px 14px rgba(0,0,0,.35)}
.hcard.sel{border-color:var(--gold2);transform:translateY(-8px);box-shadow:0 8px 18px rgba(0,0,0,.42)}
.hcard .hc-n{font-size:.62rem;font-weight:700;text-align:center;line-height:1.2;margin-bottom:2px}
.hcard .hc-t{font-size:.54rem;opacity:.78;text-align:center}
.hcard .hc-ev{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:.52rem;background:rgba(0,0,0,.35);border-radius:0 0 5px 5px;padding:2px;color:rgba(255,255,255,.88)}

/* RESULT */
#result{background:var(--dark);align-items:center;justify-content:center;padding:2rem}
.res-box{max-width:440px;width:100%;text-align:center}
.res-title{font-family:'Cormorant Garamond',serif;font-size:3rem;color:var(--gold2);margin-bottom:.15rem}
.res-sub{color:rgba(255,255,255,.25);font-size:.75rem;letter-spacing:.1em;margin-bottom:2rem}
.res-row{display:flex;align-items:center;gap:.8rem;padding:.65rem .9rem;background:rgba(255,255,255,.05);border-radius:10px;margin-bottom:.42rem;border:1px solid rgba(255,255,255,.07)}
.res-row.winner{background:rgba(196,154,30,.12);border-color:rgba(196,154,30,.35)}
.rr-rk{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;flex-shrink:0}
.rr-info{flex:1;text-align:left}
.rr-name{font-weight:600;font-size:.95rem}
.rr-arts{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.rr-abadge{font-size:.6rem;padding:1px 5px;border-radius:4px;font-weight:600;color:white}
.rr-money{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gold2)}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.modal.show{opacity:1;pointer-events:all}
.mbox{background:white;border-radius:var(--r2);padding:1.6rem;max-width:400px;width:93%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.m-icon{font-size:2rem;margin-bottom:.42rem}
.m-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--dark);margin-bottom:.35rem}
.m-body{font-size:.83rem;color:var(--ink2);line-height:1.58;margin-bottom:.6rem;white-space:pre-line}
.m-btns{display:flex;flex-direction:column;gap:.38rem}
.mbtn{padding:.56rem;border:none;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;transition:all .15s}
.mbtn.pri{background:var(--gold);color:var(--dark)}
.mbtn.sec{background:var(--cream2);color:var(--ink2)}
.mbtn.red{background:var(--red);color:white}

/* round summary in modal */
.rs-header{font-size:.68rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;text-align:left}
.rs-row{display:flex;align-items:center;gap:.55rem;padding:.5rem .55rem;border-radius:8px;margin-bottom:.32rem;background:var(--cream2);border:1px solid var(--cream3)}
.rs-row.gain{background:#EDFAF3;border-color:#B8E8CA}
.rs-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:white;flex-shrink:0}
.rs-name{flex:1;font-size:.85rem;font-weight:600;text-align:left}
.rs-gain{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--green);white-space:nowrap}
.rs-zero{font-size:.8rem;color:var(--ink3)}

.wait-notice{font-size:.72rem;color:var(--ink3);font-style:italic;text-align:center;padding:.5rem;animation:fadepulse 1.2s ease-in-out infinite}
@keyframes fadepulse{0%,100%{opacity:.4}50%{opacity:1}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--cream3);border-radius:99px}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup" class="screen active">
  <div class="sw-wrap">
    <div class="sw-logo">Modern Art</div>
    <div class="sw-sub">High Stakes Bidding in the Galleries</div>
    <!-- BETA: 人數固定 4 人，隱藏選擇器。還原方式：移除下方 display:none，移除 startGame() 中的 C.num=4 -->
    <div class="pill-row" id="num-row" style="display:none">
      <button class="pill" onclick="C.num=3;syncPills()">3 人</button>
      <button class="pill on" onclick="C.num=4;syncPills()">4 人</button>
      <button class="pill" onclick="C.num=5;syncPills()">5 人</button>
    </div>
    <div class="sl">選擇挑戰等級</div>
    <div class="diff-list">
      <!-- BETA: 難度描述改為挑戰導向。還原方式：換回原文字 -->
      <div class="diff-item on" onclick="C.diff='easy';syncDiff()">🎲 輕鬆上手 — 適合第一次玩，感受拍賣節奏</div>
      <div class="diff-item" onclick="C.diff='normal';syncDiff()">🎴 初階挑戰 — 有點壓力，需要稍微想一下</div>
      <div class="diff-item" onclick="C.diff='hard';syncDiff()">🧠 進階對手 — 會算牌、會搶攻，不好對付</div>
      <div class="diff-item" onclick="C.diff='expert';syncDiff()">📐 強力競爭 — 精打細算，每一分錢都不讓你佔到</div>
      <div class="diff-item" onclick="C.diff='genius';syncDiff()">🔮 頂尖高手 — 讀得懂你的手牌，全盤佈局</div>
    </div>
    <!-- BETA: 進階設定隱藏，AI 思考延遲預設開啟。還原方式：移除下方 display:none -->
    <div style="display:none">
      <div class="sl" style="margin-top:1.2rem">進階設定</div>
      <div style="display:flex;align-items:center;gap:.7rem;padding:.55rem .8rem;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.025);cursor:pointer" onclick="C.aiThink=!C.aiThink;syncThink()">
        <div class="sw-tog on" id="think-sw" style="flex-shrink:0"></div>
        <div>
          <div style="font-size:.82rem;color:rgba(255,255,255,.7)">AI 思考延遲</div>
          <div style="font-size:.68rem;color:rgba(255,255,255,.35)">AI 出牌前有思考停頓，超過 1 秒時顯示「…」</div>
        </div>
      </div>
    </div>
    <button class="go-btn" onclick="startGame()">開始競標 →</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="topbar">
    <div class="tb-logo">Modern Art</div>
    <div class="tb-chip" id="tb-round">第 1 回合</div>

    <label class="ev-row" onclick="toggleEV()" style="display:none">
      <div class="sw-tog" id="ev-sw"></div><span>期望值</span>

    <!-- 隱藏觸發區：連點三次呼出 EV 開關。還原時可移除此區塊 -->

         style="width:28px;height:28px;cursor:default;flex-shrink:0;opacity:0"
         title=""></div>

      <div class="bid-col">
        <div id="bid-controls" style="display:none" class="bid-col-inner"></div>
      </div>
    </div>
    <div class="log-wrap" id="log"></div>
  </div>
  <div class="hand">
    <div class="hand-hdr">
      <div class="hand-lbl">手牌 <span id="hcnt" style="color:rgba(255,255,255,.2)"></span></div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="res-box">
    <div class="res-title">拍賣落槌</div>
    <div class="res-sub">FOUR ROUNDS COMPLETE</div>
    <div id="res-list"></div>
    <button class="replay" style="margin-top:1.5rem;padding:.78rem 1.8rem;background:var(--gold);border:none;border-radius:10px;color:var(--dark);font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer" onclick="location.reload()">再來一局</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="mbox">
    <div class="m-icon" id="m-icon"></div>
    <div class="m-title" id="m-title"></div>
    <div class="m-body" id="m-body"></div>
    <div id="m-extra"></div>
    <div class="m-btns" id="m-btns"></div>
  </div>
</div>

<script>
// ══ CONSTANTS ══════════════════════════════════
const ARTISTS=['Mira Voss','Kenji','Cleo Stark','Ran Ortiz','Domu'];
const ASHORT=['MV','KJ','CS','RO','DM'];
// Artist colors (saturated for cards)
const ACOL=['#6B2E85','#B03028','#C07010','#1A6840','#1550A0'];
// Player name colors — separate palette, clearly readable, no overlap with artist colors
const PNCOL=['#1865C0','#8B34A0','#B02020','#167848','#C06018'];
const TYPES=['open','sealed','once','fixed','double'];
const TL={open:'公開',sealed:'暗標',once:'依序',fixed:'定價',double:'雙重'};
const TC={open:'#6B2E85',sealed:'#B03028',once:'#1A6840',fixed:'#1550A0',double:'#C07010'};
const ADIST=[[2,2,2,3,3],[2,3,3,2,3],[2,3,3,3,3],[3,3,3,3,3],[3,3,3,3,4]];
const ATOTAL=ADIST.map(d=>d.reduce((a,b)=>a+b,0));
const RDEAL={3:[10,6,6,0],4:[9,4,4,0],5:[8,3,3,0]};
const RVAL=[30,20,10,0,0];
const NAMES={
  easy:['Mimi','Percy','Dodo','Lulu','Benny','Rosie'],
  normal:['Marco','Elena','Oliver','Nadia','Felix'],
  hard:['Sterling','Vivienne','Aldous','Ingrid','Caspian'],
  expert:['Axiom','Quant','Sigma','Vector','Prism'],
  genius:['Oracle','Cipher','Apex','Nexus','Zeta']
};

// ══ STATE ══════════════════════════════════════
let C={num:4,diff:'easy',aiThink:true};
let G=null;
let selIdx=null;
let evOn=false;
let timerID=null;
let autoPassTimer=null;
let phase='idle';
let _dc=null; // double card temp

// BETA: 三連擊解鎖 EV 開關 ─────────────────────
// 還原方式：移除此區塊（_secretTaps, _secretTimer, handleSecretTap）
let _secretTaps=0, _secretTimer=null;
function handleSecretTap(){
  _secretTaps++;
  if(_secretTimer) clearTimeout(_secretTimer);
  _secretTimer = setTimeout(()=>{ _secretTaps=0; }, 900);
  if(_secretTaps>=3){
    _secretTaps=0;
    const evRow = document.querySelector('.ev-row');
    if(evRow){
      const isHidden = evRow.style.display==='none';
      evRow.style.display = isHidden ? 'flex' : 'none';
      if(isHidden){
        // 短暫閃爍提示已解鎖
        evRow.style.outline='1px solid var(--gold)';
        setTimeout(()=>{ evRow.style.outline=''; }, 600);
      }
    }
  }
}
// ─────────────────────────────────────────────

function syncPills(){document.querySelectorAll('#num-row .pill').forEach((b,i)=>b.classList.toggle('on',i===C.num-3));}
function syncDiff(){const ds=['easy','normal','hard','expert','genius'];document.querySelectorAll('.diff-item').forEach((b,i)=>b.classList.toggle('on',ds[i]===C.diff));}
function syncThink(){document.getElementById('think-sw').classList.toggle('on',C.aiThink);}
function toggleEV(){
  evOn=!evOn;
  document.getElementById('ev-sw').classList.toggle('on',evOn);
  renderHand();
  const evEl=document.getElementById('auction-ev');
  if(evEl) evEl.style.display=evOn?'':'none';
  if(evOn) updateAuctionEV();
  document.querySelectorAll('.pcard .pc-ev').forEach(el=>{
    el.style.display=evOn?'':'none';
  });
}

// ══ DECK ═══════════════════════════════════════
function buildDeck(){
  let d=[];
  ARTISTS.forEach((_,ai)=>TYPES.forEach((type,ti)=>{
    for(let i=0;i<ADIST[ai][ti];i++) d.push({ai,type,id:d.length});
  }));
  return shuffle(d);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function randName(diff,used){const p=NAMES[diff];const a=p.filter(n=>!used.includes(n));return(a.length?a:p)[Math.floor(Math.random()*(a.length||p.length))];}

// ══ INIT ═══════════════════════════════════════
function startGame(){
  // BETA: 固定 4 人局。還原方式：移除下行
  C.num=4;
  const n=C.num;
  const usedN=[];
  G={
    round:1,turnIdx:0,n,
    players:Array.from({length:n},(_,i)=>{
      const name=i===0?'你':randName(C.diff,usedN);
      if(i>0)usedN.push(name);
      return{name,color:PNCOL[i],human:i===0,money:100,hand:[],bought:[]};
    }),
    deck:buildDeck(),
    mvals:ARTISTS.map(()=>[]),
    rOut:ARTISTS.map(()=>0),
    aOut:ARTISTS.map(()=>0),
    auction:null,
    // Item 8: track each player's auction earnings per round (sold - bought)
    roundEarnings:Array.from({length:n},()=>0),
  };
  dealRound();
  showScreen('game');
  renderAll();
  nextTurn();
}
function dealRound(){
  const per=RDEAL[G.n][G.round-1];if(per===0)return;
  G.players.forEach(p=>{for(let i=0;i<per&&G.deck.length;i++)p.hand.push(G.deck.pop());p.hand.sort((a,b)=>a.ai-b.ai);});
}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ══ RENDER ═════════════════════════════════════
function renderAll(){
  renderMarket();renderPlayers();renderHand();
  document.getElementById('tb-round').textContent=`第 ${G.round} 回合`;
}

function renderMarket(){
  // Compute correct current ranking with tie-breaker:
  // Sort by (out DESC, aOut ASC) — more cards wins; if equal, earlier artist wins
  const rankOrder = ARTISTS.map((_,ai)=>({ai, out:G.rOut[ai], aOut:G.aOut[ai]}))
    .filter(x=>x.out>0)
    .sort((a,b)=>b.out-a.out || a.aOut-b.aOut);
  // Map each artist to its current estimated rank (0-indexed), -1 if not placed
  const estRank = ARTISTS.map((_,ai)=>{
    const pos = rankOrder.findIndex(x=>x.ai===ai);
    return pos; // -1 if out=0
  });

  document.getElementById('mboard').innerHTML=ARTISTS.map((_,ai)=>{
    const col=ACOL[ai],out=G.rOut[ai],cv=G.mvals[ai].reduce((a,b)=>a+b,0);
    const pips=Array.from({length:5},(_,i)=>`<div class="pip${i<out?' out':''}" style="color:${col}"></div>`).join('');
    const chips=Array.from({length:4},(_,i)=>{const v=G.mvals[ai][i]||0;const bg=v===30?'#B8912A':v===20?'#6A8AA4':v===10?'#8A7B5A':'rgba(0,0,0,.12)';return `<div class="rchip" style="background:${bg}">${v||'·'}</div>`;}).join('');

    // Estimated rank value using correct tie-breaker ranking
    let estHTML = '';
    if(out>0){
      const rank = estRank[ai]; // 0=1st, 1=2nd, 2=3rd, 3+=no prize
      const rankVal = rank>=0 && rank<=2 ? RVAL[rank] : 0;
      const estTotal = cv + rankVal;
      // Show rank indicator (🥇🥈🥉) only if 4+ cards (fairly locked in)
      const rankBadge = out>=4 ? ['🥇','🥈','🥉',''][Math.min(rank,3)] : '';
      estHTML = `<div class="a-est" title="預估本輪排名與價值（虛線代表仍可變動）">${rankBadge}$${estTotal}</div>`;
    }

    return `<div class="a-tile">
      <div class="a-head" style="background:${col}">
        <span class="a-hname">${ARTISTS[ai]}</span>
      </div>
      <div class="a-body">
        <div class="a-cnt-row">
          <span class="a-cnt" style="color:${col}">${out}</span>
          <span class="a-max">/5</span>
          ${estHTML}
        </div>
        <span class="a-total">共 ${G.aOut[ai]}/${ATOTAL[ai]}</span>
        <div class="a-pips">${pips}</div>
      </div>
      <div class="a-rounds">${chips}</div>
    </div>`;
  }).join('');
}

function renderPlayers(){
  document.getElementById('player-col').innerHTML=G.players.map((p,pid)=>{
    const cur=G.turnIdx===pid;
    // Collection cards — larger visual
    const collCards=p.bought.map(c=>`<div class="coll-card" style="background:${ACOL[c.ai]}" title="${ARTISTS[c.ai]}"><div class="cc-a">${ASHORT[c.ai]}</div></div>`).join('');
    const artsRow=ARTISTS.map((_,ai)=>{const cnt=p.bought.filter(c=>c.ai===ai).length;return cnt?`<span class="abadge" style="background:${ACOL[ai]}22;color:${ACOL[ai]}">${ASHORT[ai]}×${cnt}</span>`:''}).join('');
    if(p.human){
      return `<div class="p-tile human-tile${cur?' cur':''}" id="ptile-0">
        <div class="pt-top">
          <div class="pt-av" style="background:${p.color}">${p.name[0]}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:baseline;gap:.4rem;flex-wrap:wrap">
              <div class="pt-name">${p.name} 👤</div>
              <div class="pt-money-inline">$${p.money}</div>
            </div>
            <div class="pt-sub">${cur?'你的回合':'等待中'}</div>
          </div>
        </div>
        <div class="pt-arts">${artsRow||`<span style="font-size:.58rem;color:var(--ink3)">尚無收藏</span>`}</div>
        ${collCards?`<div class="pt-collection">${collCards}</div>`:''}
      </div>`;
    }
    return `<div class="p-tile${cur?' cur':''}" id="ptile-${pid}">
      <div class="pt-top"><div class="pt-av" style="background:${p.color}">${p.name[0]}</div><div><div class="pt-name" style="color:${p.color}">${p.name}</div><div class="pt-sub">${diffName()} · 手牌${p.hand.length}張</div></div></div>
      <div class="pt-arts">${artsRow||`<span style="font-size:.58rem;color:var(--ink3)">無</span>`}</div>
      ${collCards?`<div class="pt-collection">${collCards}</div>`:''}
    </div>`;
  }).join('');
}

function diffName(){return{easy:'新手',normal:'桌遊友善',hard:'桌遊高手',expert:'數學高手',genius:'數學天才'}[C.diff]||'數學高手';}

function renderHand(){
  const me=G.players[0];
  document.getElementById('hand-cards').innerHTML=me.hand.map((c,i)=>{
    const ev=evOn?calcCardEV(c):null;
    return `<div class="hcard${selIdx===i?' sel':''}" style="background:${ACOL[c.ai]}" onclick="pickCard(${i})">
      <div class="hc-n">${ASHORT[c.ai]}</div>
      <div class="hc-t">${TL[c.type]}</div>
      <div class="hc-ev">${ev?'$'+ev.lo+'–'+ev.hi:''}</div>
    </div>`;
  }).join('');
  document.getElementById('hcnt').textContent=`(${me.hand.length})`;
  document.getElementById('play-btn').disabled=selIdx===null||phase!=='play'||G.turnIdx!==0;
}

// ══ EV (display functions — use artistEV engine) ═══════
function calcCardEV(card){
  const ev=artistEV(card.ai,0);
  return{lo:Math.floor(ev.rawEV*.65),hi:Math.floor(ev.rawEV*1.08)};
}
function calcBuyEV(card){
  const ev=artistEV(card.ai,1);
  return{expected:ev.expected,prob:ev.prob,cv:ev.cv};
}
function updateAuctionEV(){
  const el=document.getElementById('auction-ev');if(!el||!G.auction)return;
  if(!evOn){el.innerHTML='';return;}
  const card=G.auction.card,ev=calcBuyEV(card);
  el.innerHTML=`<div class="ev-title">📊 期望值</div><div class="ev-rows">
    <div class="ev-r"><span class="ev-l">累積市場值</span><span class="ev-v">${ev.cv>0?'$'+ev.cv:'未排名'}</span></div>
    <div class="ev-r"><span class="ev-l">本輪已出</span><span class="ev-v">${G.rOut[card.ai]}/5</span></div>
    <div class="ev-r"><span class="ev-l">入場機率</span><span class="ev-v">${ev.prob}%</span></div>
    <div class="ev-r"><span class="ev-l">預期回收</span><span class="ev-v" style="color:var(--gold)">≈$${ev.expected}</span></div>
  </div>`;
}

// ══ BID CONTROLS (right col, bottom-anchored) ══
function showBidControls(minVal,maxVal,opts={}){
  const el=document.getElementById('bid-controls');
  el.style.display='';
  if(window._bv===null||window._bv===undefined||window._bv<minVal)window._bv=minVal;
  _renderBidCtl(minVal,maxVal,opts);
  window.adjBid=function(d){
    window._bv=Math.max(minVal,Math.min(maxVal,(window._bv||minVal)+d));
    _renderBidCtl(minVal,maxVal,opts);
  };
}
function _renderBidCtl(minVal,maxVal,opts){
  const v=window._bv||minVal;
  const show50=v>=30||maxVal>=50;
  document.getElementById('bid-controls').innerHTML=`
    <div class="bc-title">${opts.title||'出價'}</div>
    <div class="bid-display">
      <div class="bid-display-num">$${v}</div>
      <div class="bid-display-sub">${opts.subText||''}</div>
    </div>
    <div class="step-grid">
      ${show50?`<button class="sbtn neg" onclick="adjBid(-50)">−50</button><button class="sbtn" onclick="adjBid(50)">+50</button>`:`<div></div><div></div>`}
      <button class="sbtn neg" onclick="adjBid(-10)">−10</button><button class="sbtn" onclick="adjBid(10)">+10</button>
      <button class="sbtn neg" onclick="adjBid(-5)">−5</button><button class="sbtn" onclick="adjBid(5)">+5</button>
      <button class="sbtn neg" onclick="adjBid(-1)">−1</button><button class="sbtn" onclick="adjBid(1)">+1</button>
    </div>
    ${opts.confirmHTML||''}
    <div class="bid-note" id="bc-note">${opts.note||''}</div>`;
}
function hideBidControls(){document.getElementById('bid-controls').style.display='none';window._bv=null;}

// ══ TURN FLOW ══════════════════════════════════
function nextTurn(){
  if(phase==='end')return;
  phase='play';selIdx=null;clearAutoPass();hideBidControls();renderAll();
  document.getElementById('ac-title').textContent='等待出牌…';
  document.getElementById('ac-badge').style.display='none';

  const p=G.players[G.turnIdx];

  // Skip empty-hand players
  if(!p.hand.length){
    if(G.players.every(pl=>!pl.hand.length)){
      addLog('所有玩家手牌用盡，遊戲提前結束',false,true);
      phase='end';setTimeout(showResult,600);return;
    }
    addLog(`${ns(p)} 無手牌，跳過`);
    advanceTurn();return;
  }

  if(G.turnIdx===0){
    document.getElementById('ac-body').innerHTML=`<div class="wait-notice">你的回合 — 選一張手牌</div>`;
    renderHand();
  } else {
    document.getElementById('ac-body').innerHTML=`<div class="wait-notice">${p.name} 思考中…</div>`;
    // Item 11: variable AI delay 300-2300ms, show thinking bubble if >1s
    const thinkMs=300+Math.random()*2000;
    if(C.aiThink && thinkMs>1000){
      setTimeout(()=>{if(G.turnIdx===G.players.indexOf(p))renderThinking(G.turnIdx);},900);
    }
    setTimeout(()=>aiPlayCard(G.turnIdx),thinkMs);
  }
}

function renderThinking(pid){
  const el=document.getElementById(`ptile-${pid}`);
  if(!el)return;
  const ex=el.querySelector('.pt-thinking');
  if(!ex){
    const d=document.createElement('div');d.className='pt-thinking';d.innerHTML='<span></span><span></span><span></span>';
    el.appendChild(d);
    setTimeout(()=>d.remove(),1800);
  }
}
function pickCard(i){if(phase!=='play'||G.turnIdx!==0)return;selIdx=selIdx===i?null:i;renderHand();}
function playSelected(){
  if(selIdx===null||phase!=='play'||G.turnIdx!==0)return;
  const me=G.players[0],card=me.hand[selIdx];
  me.hand.splice(selIdx,1);selIdx=null;initiatePlay(card,0);
}
function initiatePlay(card,pid){
  G.rOut[card.ai]++;G.aOut[card.ai]++;
  addLog(`${ns(G.players[pid])} 出牌：${as(card.ai)}（${TL[card.type]}）`,pid===0);
  // Bug fix: Double 牌出牌時市場板應顯示 N+2（第一張 + 即將補的第二張）
  // 暫時 +1 讓 renderMarket 顯示正確，playSecondCard 真正 ++ 後自然正確
  if(card.type==='double') G.rOut[card.ai]++;
  renderMarket();
  if(card.type==='double') G.rOut[card.ai]--; // 還原暫時計數
  if(roundEndCheck(card))return;
  phase='auction';
  if(card.type==='double')doDoubleFlow(card,pid);
  else launchAuction(card,pid,card.type,null);
}

// ══ DOUBLE FLOW ════════════════════════════════
function doDoubleFlow(card,origPid){
  _dc=card;
  const op=G.players[origPid];
  const cands=op.hand.filter(c=>c.ai===card.ai&&c.type!=='double');
  if(origPid===0){
    if(!cands.length)passDoubleAround(card,origPid,(origPid+1)%G.n);
    else showDoubleUI(card,origPid,cands,false);
  } else {
    if(cands.length&&aiWillPlaySecond(op,card)){playSecondCard(op,cands[0],origPid);}
    else passDoubleAround(card,origPid,(origPid+1)%G.n);
  }
}
function playSecondCard(player,sc,newSeller){
  const idx=player.hand.indexOf(sc);player.hand.splice(idx,1);
  G.rOut[sc.ai]++;G.aOut[sc.ai]++;
  addLog(`${ns(player)} 補牌成為新拍賣人（${as(sc.ai)} ${TL[sc.type]}）`,newSeller===0);
  if(roundEndCheck(sc))return;
  launchAuction(_dc,newSeller,sc.type,sc);
}
function passDoubleAround(card,origPid,startFrom,humanSkip=false){
  _dc=card;let cur=startFrom,tries=0;
  function nxt(){
    if(cur===origPid||tries>=G.n){
      addLog(`全員 Pass，${ns(G.players[origPid])} 免費取回`);
      G.players[origPid].hand.push(card);G.rOut[card.ai]--;G.aOut[card.ai]--;
      G.players[origPid].hand.sort((a,b)=>a.ai-b.ai);
      afterAuction(origPid);return;
    }
    const p=G.players[cur];const cands=p.hand.filter(c=>c.ai===card.ai&&c.type!=='double');
    if(cur===0&&!humanSkip){
      if(!cands.length){addLog('你無牌可補');tries++;cur=(cur+1)%G.n;setTimeout(nxt,200);}
      else showDoubleUI(card,origPid,cands,true);
      return;
    }
    if(cands.length&&aiWillPlaySecond(p,card)){playSecondCard(p,cands[0],cur);}
    else{if(cands.length)addLog(`${ns(p)} Pass`);tries++;cur=(cur+1)%G.n;setTimeout(nxt,350);}
  }
  setTimeout(nxt,300);
}

window.humanSecondCard=function(idx,origPid,isLate){
  closeModal();const me=G.players[0];const sc=me.hand[idx];
  me.hand.splice(idx,1);G.rOut[sc.ai]++;G.aOut[sc.ai]++;

  if(roundEndCheck(sc))return;

};
window.humanPassDouble=function(origPid,isLate){

function aiWillPlaySecond(player,card){
  const b=player.bought.filter(c=>c.ai===card.ai).length;
  if(C.diff==='easy')return b>=1||Math.random()<.42;
  if(C.diff==='normal')return b>=1||G.rOut[card.ai]>=2||Math.random()<.55;
  return Math.random()<.88; // hard/expert almost always want to be auctioneer
}

// ══ AUCTION ENGINE ═════════════════════════════
function launchAuction(card,sellerPid,atype,card2){
  G.auction={card,card2,sellerPid,atype};
  const cards=card2?[card,card2]:[card];
  const badge=document.getElementById('ac-badge');
  badge.style.display='';badge.style.background=TC[atype]+'22';badge.style.color=TC[atype];

  else if(atype==='sealed')aSealed(cards,sellerPid);

function cardsHTML(cards){

// Item 10: proper card-fly animation to winner's player tile
function flyCards(cards,winnerPid,cb){
  const cardEls=document.querySelectorAll('.pcard');
  if(!cardEls.length||winnerPid<0){setTimeout(cb,400);return;}

  // Get target tile position
  const targetId=`ptile-${winnerPid}`;
  const target=document.getElementById(targetId);
  if(!target){setTimeout(cb,400);return;}

  const targetRect=target.getBoundingClientRect();
  const targetCx=targetRect.left+targetRect.width/2;
  const targetCy=targetRect.top+targetRect.height/2;

  cardEls.forEach(cardEl=>{
    const cr=cardEl.getBoundingClientRect();
    const cardCx=cr.left+cr.width/2;
    const cardCy=cr.top+cr.height/2;
    const dx=targetCx-cardCx;
    const dy=targetCy-cardCy;

    // Animate with keyframes via JS
    cardEl.animate([
      {transform:'scale(1)',opacity:1,offset:0},
      {transform:`scale(1.15) translate(${dx*0.3}px,${dy*0.3}px)`,opacity:1,offset:0.25},
      {transform:`scale(0.6) translate(${dx}px,${dy}px)`,opacity:0,offset:1}
    ],{duration:1200,easing:'ease-in',fill:'forwards'});
  });

  // Flash the target tile
  if(target){
    target.style.transition='box-shadow .2s';
    target.style.boxShadow='0 0 0 3px var(--gold2)';
    setTimeout(()=>{target.style.boxShadow='';},800);
  }
  setTimeout(cb,1400);
}

// ─── OPEN ───────────────────────────────────────
function aOpen(cards,sellerPid){
  let hi=0,winner=-1,hist=[];
  let apQueued=false;
  function initAI(){
    for(let i=1;i<G.n;i++){
      if(i===sellerPid)continue; // seller never bids in their own open auction
      const p=G.players[i];const mx=aiMax(p,cards[0],false);
      if(Math.random()>aiPassRate()){
        const b=Math.max(1,Math.floor(mx*(.28+Math.random()*.35)));
        if(b>hi&&b<=p.money){hi=b;winner=i;hist.push({pid:i,amt:b});}
      }
    }
    renderOA();
  }
  function renderOA(){
    const isMe=winner===0;
    document.getElementById('ac-body').innerHTML=`
      ${cardsHTML(cards)}${evPanelHTML()}${lbb(hi,winner)}
      <div class="bid-hist">${hist.slice(-4).map(h=>`<div class="bh-row"><span style="font-weight:600;color:${G.players[h.pid].color}">${G.players[h.pid].name}</span><span class="bh-amt"> $${h.amt}</span></div>`).join('')||`<div style="font-size:.68rem;color:var(--ink3)">尚無出價</div>`}</div>`;
    updateAuctionEV();
    const mn=hi+1,mx=G.players[0].money;
    if(isMe){
      hideBidControls();
      showBidControls(mn,mx,{title:'繼續加碼',subText:'你目前最高',confirmHTML:`<button class="confirm-btn" onclick="doOA()">加碼確認</button><button class="pass-btn" onclick="passOA()">立即落槌</button>`});
      apQueued=true;clearAutoPass();
      autoPassTimer=setTimeout(()=>{if(apQueued){apQueued=false;finalizeOA();}},1500);
    } else {
      showBidControls(mn,mx,{title:'公開競標',subText:`需高於 $${hi}`,confirmHTML:`<button class="confirm-btn" onclick="doOA()">確認出價</button><button class="pass-btn" onclick="passOA()">Pass</button>`});
    }
  }
  window.doOA=function(){
    clearAutoPass();apQueued=false;
    const me=G.players[0],v=window._bv||0;
    if(v<=hi||v>me.money){const n=document.getElementById('bc-note');if(n)n.textContent='出價需高於 $'+hi;return;}
    hi=v;winner=0;hist.push({pid:0,amt:v});
    addLog(`你出價 $${v}`,true);hideBidControls();
    let i=1;
    function cyc(){
      if(i>=G.n){renderOA();return;}
      const p=G.players[i];
      if(i!==sellerPid){ // seller never counter-bids own auction
        const mx=aiMax(p,cards[0],false);
        while(hi<mx&&Math.random()>aiPassRate()){
          const nb=hi+1+Math.floor(Math.random()*4);
          if(nb<=p.money&&nb<=mx){hi=nb;winner=i;hist.push({pid:i,amt:nb});addLog(`${ns(p)} $${nb}`);break;}else break;
        }
      }
      i++;setTimeout(cyc,280);
    }
    setTimeout(cyc,350);
  };
  window.passOA=function(){clearAutoPass();apQueued=false;finalizeOA();};
  function finalizeOA(){
    hideBidControls();
    if(winner<0){G.players[sellerPid].bought.push(...cards);addLog(`無人出價，${ns(G.players[sellerPid])} 免費得標`);}
    else{
      const buyer=G.players[winner];const isMine=winner===0;const isMyCard=sellerPid===0;
      if(winner===sellerPid){buyer.money-=hi;buyer.bought.push(...cards);recordEarning(sellerPid,winner,hi);addLog(`${ns(buyer)} 自己得標 $${hi}（付銀行）`,isMine,false,isMine);}
      else{buyer.money-=hi;G.players[sellerPid].money+=hi;buyer.bought.push(...cards);recordEarning(sellerPid,winner,hi);addLog(`🔨 ${ns(buyer)} 得標 $${hi}${isMyCard?` → 你收 $${hi}`:''}`,false,false,isMine,isMyCard);}
    }
    flyCards(cards,winner,()=>afterAuction(sellerPid));
  }
  setTimeout(initAI,300);
}

// ─── SEALED ─────────────────────────────────────
function aSealed(cards,sellerPid){
  document.getElementById('ac-body').innerHTML=`${cardsHTML(cards)}${evPanelHTML()}<div style="font-size:.75rem;color:var(--ink2)">暗標：全員同時揭示，最高者得標</div>`;
  updateAuctionEV();
  showBidControls(0,G.players[0].money,{title:'暗標出價',subText:'0 = 不出價',confirmHTML:`<button class="confirm-btn" onclick="doSealed()">確認暗標</button>`});
  window.doSealed=function(){
    const myBid=window._bv||0;
    const bids=[{pid:0,bid:myBid}];
    for(let i=1;i<G.n;i++){
      const p=G.players[i];
      const ownCard=(i===sellerPid);
      const mx=aiMax(p,cards[0],ownCard);
      // Seller gets 0 max bid → bids 0 (pays bank if wins, but won't win unless all others bid 0)
      bids.push({pid:i,bid:Math.min(Math.max(0,Math.floor(mx*(.45+Math.random()*.45))),p.money)});
    }
    addLog('暗標揭示：'+bids.map(b=>`${ns(G.players[b.pid])}=$${b.bid}`).join(' '),false,true);
    let best=bids.reduce((a,b)=>{if(b.bid>a.bid)return b;if(b.bid===a.bid&&b.pid===sellerPid)return b;return a;});
    hideBidControls();
    if(best.bid===0){G.players[sellerPid].bought.push(...cards);addLog(`無人出價免費得標`);}
    else{
      const buyer=G.players[best.pid];const isMine=best.pid===0;const isMyCard=sellerPid===0;
      if(best.pid===sellerPid){buyer.money-=best.bid;buyer.bought.push(...cards);recordEarning(sellerPid,best.pid,best.bid);addLog(`${ns(buyer)} 暗標得標 $${best.bid}（付銀行）`,isMine,false,isMine);}
      else{buyer.money-=best.bid;G.players[sellerPid].money+=best.bid;buyer.bought.push(...cards);recordEarning(sellerPid,best.pid,best.bid);addLog(`🔨 ${ns(buyer)} 暗標得標 $${best.bid}${isMyCard?` → 你收 $${best.bid}`:''}`,false,false,isMine,isMyCard);}
    }
    flyCards(cards,best.pid,()=>afterAuction(sellerPid));
  };
}

      else addLog(`${ns(p)} Pass`);
      setTimeout(nxt,320);
    }
  }
  function finalizeOnce(){
    hideBidControls();
    if(winner<0){G.players[sellerPid].bought.push(...cards);addLog(`無人出價免費得標`);}
    else{
      const b=G.players[winner];const isMine=winner===0;const isMyCard=sellerPid===0;
      if(winner===sellerPid){b.money-=hi;b.bought.push(...cards);recordEarning(sellerPid,winner,hi);addLog(`${ns(b)} 自己得標 $${hi}（付銀行）`,isMine,false,isMine);}
      else{b.money-=hi;G.players[sellerPid].money+=hi;b.bought.push(...cards);recordEarning(sellerPid,winner,hi);addLog(`🔨 ${ns(b)} 以 $${hi} 得標${isMyCard?` → 你收 $${hi}`:''}`,false,false,isMine,isMyCard);}

function runFixed(cards,sellerPid,price){
  // FIX: ensure price is a valid number
  const safePrice=parseInt(price)||1;
  const order=[];for(let i=(sellerPid+1)%G.n;i!==sellerPid;i=(i+1)%G.n)order.push(i);order.push(sellerPid);
  let oi=0;
  function nxt(){
    if(oi>=order.length){afterAuction(sellerPid);return;}

    if(pid===0){
      document.getElementById('ac-body').innerHTML=`${cardsHTML(cards)}<div style="font-size:.95rem;font-weight:600;text-align:center;margin:.4rem 0">定價：<span style="color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:1.5rem">$${safePrice}</span></div>`;
      document.getElementById('bid-controls').style.display='';
      document.getElementById('bid-controls').innerHTML=`
